name: Build Android APK and AAB

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]

jobs:
  android:
    name: Godot Android Export
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.6.3
    env:
      EXPORT_NAME: pinguins-x-focas
      GODOT_VERSION: "4.6.3"
      GODOT_TEMPLATE_VERSION: "4.6.3.stable"
      KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      KEYSTORE_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        shell: bash
        run: |
          set -euxo pipefail
          apt-get update
          apt-get install -y --no-install-recommends \
            ca-certificates \
            wget \
            unzip \
            libfontconfig1 \
            openjdk-17-jdk-headless

      - name: Prepare Android SDK, Java and Godot export templates
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p build/android
          godot --version

          RESOLVED_ANDROID_HOME="${ANDROID_HOME:-${ANDROID_SDK_ROOT:-}}"
          if [ -z "$RESOLVED_ANDROID_HOME" ] || [ ! -d "$RESOLVED_ANDROID_HOME" ]; then
            for CANDIDATE in /opt/android-sdk /opt/android-sdk-linux /usr/lib/android-sdk /usr/local/lib/android/sdk; do
              if [ -d "$CANDIDATE" ]; then
                RESOLVED_ANDROID_HOME="$CANDIDATE"
                break
              fi
            done
          fi
          test -n "$RESOLVED_ANDROID_HOME"
          test -d "$RESOLVED_ANDROID_HOME"

          RESOLVED_JAVA_HOME="${JAVA_HOME:-}"
          if [ -z "$RESOLVED_JAVA_HOME" ] || [ ! -d "$RESOLVED_JAVA_HOME" ]; then
            RESOLVED_JAVA_HOME="$(dirname "$(dirname "$(readlink -f "$(command -v javac)")")")"
          fi
          test -d "$RESOLVED_JAVA_HOME"

          echo "ANDROID_HOME=$RESOLVED_ANDROID_HOME" >> "$GITHUB_ENV"
          echo "ANDROID_SDK_ROOT=$RESOLVED_ANDROID_HOME" >> "$GITHUB_ENV"
          echo "JAVA_HOME=$RESOLVED_JAVA_HOME" >> "$GITHUB_ENV"

          SDKMANAGER="$RESOLVED_ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -x "$SDKMANAGER" ]; then
            SDKMANAGER="$(command -v sdkmanager || true)"
          fi
          test -n "$SDKMANAGER"
          yes | "$SDKMANAGER" --licenses >/dev/null || true
          "$SDKMANAGER" \
            "platform-tools" \
            "build-tools;35.0.1" \
            "platforms;android-35" \
            "cmdline-tools;latest" \
            "cmake;3.10.2.4988404" \
            "ndk;28.1.13356709"

          TEMPLATE_DIR="$HOME/.local/share/godot/export_templates/${GODOT_TEMPLATE_VERSION}"
          mkdir -p "$TEMPLATE_DIR"

          if [ ! -f "$TEMPLATE_DIR/android_debug.apk" ] || [ ! -f "$TEMPLATE_DIR/android_release.apk" ] || [ ! -f "$TEMPLATE_DIR/android_source.zip" ]; then
            for CANDIDATE in \
              "/root/.local/share/godot/export_templates/${GODOT_TEMPLATE_VERSION}" \
              "/root/.local/share/godot/templates/${GODOT_TEMPLATE_VERSION}" \
              "/github/home/.local/share/godot/export_templates/${GODOT_TEMPLATE_VERSION}"; do
              if [ -f "$CANDIDATE/android_source.zip" ]; then
                cp -a "$CANDIDATE/." "$TEMPLATE_DIR/"
                break
              fi
            done
          fi

          if [ ! -f "$TEMPLATE_DIR/android_source.zip" ]; then
            wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_export_templates.tpz" -O /tmp/godot_templates.tpz
            unzip -q /tmp/godot_templates.tpz -d /tmp/godot_templates
            cp -a /tmp/godot_templates/templates/. "$TEMPLATE_DIR/"
          fi

          test -f "$TEMPLATE_DIR/android_debug.apk"
          test -f "$TEMPLATE_DIR/android_release.apk"
          test -f "$TEMPLATE_DIR/android_source.zip"
          ls -lh "$TEMPLATE_DIR" | sed -n '1,100p'

      - name: Configure Godot editor settings and keystores
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p "$HOME/.config/godot" "$HOME/.android"

          if [ ! -f "$HOME/.android/debug.keystore" ]; then
            keytool -genkeypair -v \
              -keystore "$HOME/.android/debug.keystore" \
              -storepass android \
              -keypass android \
              -alias androiddebugkey \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US"
          fi

          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > "$GITHUB_WORKSPACE/upload-key.jks"
            RELEASE_KEYSTORE="$GITHUB_WORKSPACE/upload-key.jks"
            RELEASE_ALIAS="$KEYSTORE_ALIAS"
            RELEASE_PASSWORD="$KEYSTORE_PASSWORD"
          else
            keytool -genkeypair -v \
              -keystore "$GITHUB_WORKSPACE/temp-release-key.jks" \
              -storepass android \
              -keypass android \
              -alias androiddebugkey \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=Temp,O=Toxic,C=BR"
            RELEASE_KEYSTORE="$GITHUB_WORKSPACE/temp-release-key.jks"
            RELEASE_ALIAS="androiddebugkey"
            RELEASE_PASSWORD="android"
          fi

          {
            echo "GODOT_ANDROID_KEYSTORE_DEBUG_PATH=$HOME/.android/debug.keystore"
            echo "GODOT_ANDROID_KEYSTORE_DEBUG_USER=androiddebugkey"
            echo "GODOT_ANDROID_KEYSTORE_DEBUG_PASSWORD=android"
            echo "GODOT_ANDROID_KEYSTORE_RELEASE_PATH=$RELEASE_KEYSTORE"
            echo "GODOT_ANDROID_KEYSTORE_RELEASE_USER=$RELEASE_ALIAS"
            echo "GODOT_ANDROID_KEYSTORE_RELEASE_PASSWORD=$RELEASE_PASSWORD"
          } >> "$GITHUB_ENV"

          for SETTINGS_FILE in "$HOME/.config/godot/editor_settings-4.tres" "$HOME/.config/godot/editor_settings-4.6.tres"; do
            {
              echo '[gd_resource type="EditorSettings" format=3]'
              echo ''
              echo '[resource]'
              echo "export/android/android_sdk_path = \"$ANDROID_HOME\""
              echo "export/android/java_sdk_path = \"$JAVA_HOME\""
              echo "export/android/debug_keystore = \"$HOME/.android/debug.keystore\""
              echo 'export/android/debug_keystore_user = "androiddebugkey"'
              echo 'export/android/debug_keystore_pass = "android"'
            } > "$SETTINGS_FILE"
          done

          echo "--- editor_settings-4.6.tres ---"
          cat "$HOME/.config/godot/editor_settings-4.6.tres"
          echo "--- export_presets.cfg ---"
          sed -n '1,240p' export_presets.cfg

      - name: Validate Godot project import
        shell: bash
        run: |
          set -euxo pipefail
          timeout 120s godot --headless --verbose --path . --editor --quit || true

      - name: Export debug APK
        shell: bash
        run: |
          set -euxo pipefail
          rm -rf android
          mkdir -p build/android
          godot --headless --verbose --path . --export-debug "Android APK" "build/android/${EXPORT_NAME}-debug.apk"
          test -f "build/android/${EXPORT_NAME}-debug.apk"
          ls -lh build/android

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.EXPORT_NAME }}-debug-apk
          path: build/android/*.apk
          if-no-files-found: error

      - name: Install Android build template for AAB
        shell: bash
        run: |
          set -euxo pipefail
          rm -rf android
          TEMPLATE_DIR="$HOME/.local/share/godot/export_templates/${GODOT_TEMPLATE_VERSION}"

          godot --headless --verbose --path . --install-android-build-template --quit || true

          if [ ! -d android/build ]; then
            mkdir -p android/build
            python3 - <<'PY'
          import os, zipfile
          zip_path = os.path.expanduser("~/.local/share/godot/export_templates/4.6.3.stable/android_source.zip")
          target = "android/build"
          with zipfile.ZipFile(zip_path) as zf:
              names = [name for name in zf.namelist() if name and not name.endswith("/")]
              prefixes = ["android_source/", "android/", "build/"]
              prefix = ""
              for candidate in prefixes:
                  if any(name.startswith(candidate) for name in names):
                      prefix = candidate
                      break
              for name in names:
                  out_name = name[len(prefix):] if prefix and name.startswith(prefix) else name
                  if not out_name:
                      continue
                  out_path = os.path.join(target, out_name)
                  os.makedirs(os.path.dirname(out_path), exist_ok=True)
                  with zf.open(name) as src, open(out_path, "wb") as dst:
                      dst.write(src.read())
          PY
          fi

          touch android/.gdignore
          find android -maxdepth 3 -type f | sort | sed -n '1,120p'
          test -d android/build

      - name: Export release AAB
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p build/android
          godot --headless --verbose --path . --export-release "Android AAB" "build/android/${EXPORT_NAME}-release.aab"
          test -f "build/android/${EXPORT_NAME}-release.aab"
          ls -lh build/android

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.EXPORT_NAME }}-release-aab
          path: build/android/*.aab
          if-no-files-found: error
