name: Build Android APK and AAB

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]

jobs:
  android:
    name: Godot Android Export
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.6.3
    env:
      EXPORT_NAME: pinguins-x-focas
      GODOT_VERSION: 4.6.3
      GODOT_TEMPLATE_VERSION: 4.6.3.stable
      KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      KEYSTORE_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install runner dependencies
        shell: bash
        run: |
          set -e
          apt-get update
          apt-get install -y --no-install-recommends ca-certificates wget unzip libfontconfig1

      - name: Prepare folders and tool paths
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p build/android
          godot --version
          echo "HOME=$HOME"

          RESOLVED_ANDROID_HOME="${ANDROID_HOME:-${ANDROID_SDK_ROOT:-}}"
          if [ -z "$RESOLVED_ANDROID_HOME" ] || [ ! -d "$RESOLVED_ANDROID_HOME" ]; then
            for CANDIDATE in /opt/android-sdk /opt/android-sdk-linux /usr/lib/android-sdk "$ANDROID_HOME" "$ANDROID_SDK_ROOT"; do
              if [ -n "${CANDIDATE:-}" ] && [ -d "$CANDIDATE" ]; then
                RESOLVED_ANDROID_HOME="$CANDIDATE"
                break
              fi
            done
          fi

          RESOLVED_JAVA_HOME="${JAVA_HOME:-}"
          if [ -z "$RESOLVED_JAVA_HOME" ] || [ ! -d "$RESOLVED_JAVA_HOME" ]; then
            RESOLVED_JAVA_HOME="$(dirname "$(dirname "$(readlink -f "$(command -v javac)")")")"
          fi

          echo "ANDROID_HOME=$RESOLVED_ANDROID_HOME" >> "$GITHUB_ENV"
          echo "ANDROID_SDK_ROOT=$RESOLVED_ANDROID_HOME" >> "$GITHUB_ENV"
          echo "JAVA_HOME=$RESOLVED_JAVA_HOME" >> "$GITHUB_ENV"

          echo "Resolved ANDROID_HOME=$RESOLVED_ANDROID_HOME"
          echo "Resolved JAVA_HOME=$RESOLVED_JAVA_HOME"
          test -d "$RESOLVED_ANDROID_HOME"
          test -d "$RESOLVED_JAVA_HOME"

      - name: Install Godot export templates
        shell: bash
        run: |
          set -e
          TEMPLATE_DIR="$HOME/.local/share/godot/export_templates/${GODOT_TEMPLATE_VERSION}"
          mkdir -p "$TEMPLATE_DIR"

          if [ -f "$TEMPLATE_DIR/android_source.zip" ]; then
            echo "Android export template already exists in $TEMPLATE_DIR"
            exit 0
          fi

          # The barichello/godot-ci image may contain templates under another HOME.
          for CANDIDATE in \
            "/root/.local/share/godot/export_templates/${GODOT_TEMPLATE_VERSION}" \
            "/github/home/.local/share/godot/export_templates/${GODOT_TEMPLATE_VERSION}"; do
            if [ -f "$CANDIDATE/android_source.zip" ]; then
              cp -av "$CANDIDATE/." "$TEMPLATE_DIR/"
              echo "Copied export templates from $CANDIDATE"
              exit 0
            fi
          done

          echo "Downloading Godot export templates ${GODOT_VERSION}..."
          wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_export_templates.tpz" -O /tmp/godot_templates.tpz
          unzip -q /tmp/godot_templates.tpz -d /tmp/godot_templates
          cp -av /tmp/godot_templates/templates/. "$TEMPLATE_DIR/"
          test -f "$TEMPLATE_DIR/android_source.zip"


      - name: Generate Android debug keystore
        shell: bash
        run: |
          set -e
          mkdir -p "$HOME/.android"
          if [ ! -f "$HOME/.android/debug.keystore" ]; then
            keytool -genkeypair -v \
              -keystore "$HOME/.android/debug.keystore" \
              -storepass android \
              -keypass android \
              -alias androiddebugkey \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US"
          fi
          echo "GODOT_ANDROID_KEYSTORE_DEBUG_PATH=$HOME/.android/debug.keystore" >> "$GITHUB_ENV"
          echo "GODOT_ANDROID_KEYSTORE_DEBUG_USER=androiddebugkey" >> "$GITHUB_ENV"
          echo "GODOT_ANDROID_KEYSTORE_DEBUG_PASSWORD=android" >> "$GITHUB_ENV"

      - name: Configure Godot Android editor settings
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p "$HOME/.config/godot"
          cat > "$HOME/.config/godot/editor_settings-4.tres" <<EOF
[gd_resource type="EditorSettings" format=3]

[resource]
export/android/android_sdk_path = "$ANDROID_HOME"
export/android/java_sdk_path = "$JAVA_HOME"
export/android/debug_keystore = "$HOME/.android/debug.keystore"
export/android/debug_keystore_user = "androiddebugkey"
export/android/debug_keystore_pass = "android"
EOF
          echo "--- editor_settings-4.tres ---"
          cat "$HOME/.config/godot/editor_settings-4.tres"

      - name: Install Android build template in project
        shell: bash
        run: |
          set -euxo pipefail
          TEMPLATE_DIR="$HOME/.local/share/godot/export_templates/${GODOT_TEMPLATE_VERSION}"
          test -f "$TEMPLATE_DIR/android_source.zip"

          # Avoid the Godot CLI installer here because it can return exit code 1
          # without printing a useful reason in some headless CI environments.
          rm -rf android
          mkdir -p android/build
          unzip -q "$TEMPLATE_DIR/android_source.zip" -d android/build

          # Some template archives include an android_source/ wrapper folder.
          if [ -d android/build/android_source ]; then
            shopt -s dotglob
            mv android/build/android_source/* android/build/
            rmdir android/build/android_source
            shopt -u dotglob
          fi

          chmod +x android/build/gradlew || true
          echo "--- Android build template files ---"
          find android/build -maxdepth 2 -type f | sort | sed -n '1,80p'
          test -f android/build/build.gradle || test -f android/build/build.gradle.kts

      - name: Prepare signing keystore
        shell: bash
        run: |
          set -e
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > "$GITHUB_WORKSPACE/upload-key.jks"
            echo "GODOT_ANDROID_KEYSTORE_RELEASE_PATH=$GITHUB_WORKSPACE/upload-key.jks" >> "$GITHUB_ENV"
            echo "GODOT_ANDROID_KEYSTORE_RELEASE_USER=${KEYSTORE_ALIAS}" >> "$GITHUB_ENV"
            echo "GODOT_ANDROID_KEYSTORE_RELEASE_PASSWORD=${KEYSTORE_PASSWORD}" >> "$GITHUB_ENV"
            echo "Using release keystore from repository secrets."
          else
            keytool -genkeypair -v \
              -keystore "$GITHUB_WORKSPACE/temp-release-key.jks" \
              -storepass android \
              -keypass android \
              -alias androiddebugkey \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=Temp,O=Toxic,C=BR"
            echo "GODOT_ANDROID_KEYSTORE_RELEASE_PATH=$GITHUB_WORKSPACE/temp-release-key.jks" >> "$GITHUB_ENV"
            echo "GODOT_ANDROID_KEYSTORE_RELEASE_USER=androiddebugkey" >> "$GITHUB_ENV"
            echo "GODOT_ANDROID_KEYSTORE_RELEASE_PASSWORD=android" >> "$GITHUB_ENV"
            echo "Generated temporary release keystore. Use only for tests, not for Play Store production."
          fi

      - name: Export debug APK
        shell: bash
        run: |
          set -euxo pipefail
          godot --headless --verbose --path . --export-debug "Android APK" "build/android/${EXPORT_NAME}-debug.apk"
          test -f "build/android/${EXPORT_NAME}-debug.apk"
          ls -lh build/android

      - name: Export release AAB
        shell: bash
        run: |
          set -euxo pipefail
          godot --headless --verbose --path . --export-release "Android AAB" "build/android/${EXPORT_NAME}-release.aab"
          test -f "build/android/${EXPORT_NAME}-release.aab"
          ls -lh build/android

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.EXPORT_NAME }}-debug-apk
          path: build/android/*.apk

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.EXPORT_NAME }}-release-aab
          path: build/android/*.aab
